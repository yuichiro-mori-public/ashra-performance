<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ashra Performance</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #000; touch-action: none;
}
#screen { width: 100vw; height: 100vh; }
#debug {
  position: fixed; bottom: 4px; right: 4px;
  color: rgba(255,255,255,0.15); font: 9px monospace;
  pointer-events: none;
}
#status {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  color: rgba(255,255,255,0.4); font: 14px monospace; text-align: center;
}
</style>
</head>
<body>
<div id="screen"></div>
<div id="debug"></div>
<div id="status"></div>
<script>
(function() {
  'use strict';

  var params = new URLSearchParams(location.search);
  var fps = parseInt(params.get('fps') || '10', 10);
  var serial = params.get('serial') || '';
  var startTs = parseInt(params.get('start') || '0', 10);

  var screen = document.getElementById('screen');
  var debug = document.getElementById('debug');
  var status = document.getElementById('status');

  debug.textContent = serial;

  // Blink 互換
  var text = params.get('text');
  if (text) {
    screen.style.backgroundColor = '#111';
    screen.innerHTML = '<div style="color:#fff;font:bold min(20vw,20vh) monospace;text-align:center;word-break:break-all;padding:8vw">' + text + '</div>';
    return;
  }

  // フレームデータをハッシュから取得
  var hash = location.hash.substring(1);
  if (!hash) {
    status.textContent = 'No frame data';
    return;
  }

  var frames = hash.split(',').map(function(c) {
    c = c.trim();
    if (c.charAt(0) !== '#') c = '#' + c;
    return c;
  });

  if (frames.length === 0) {
    status.textContent = 'No frames';
    return;
  }

  // ── 時刻補正: サーバー時刻との差分を計算 ──
  // worldtimeapi.org から正確な時刻を取得して、端末時計のズレを補正
  status.textContent = 'Syncing...';

  getTimeOffset(function(offset) {
    debug.textContent = serial + ' offset:' + offset + 'ms';
    status.textContent = '';
    playFrames(frames, offset);
  });

  function getTimeOffset(callback) {
    // 複数回計測して中央値を取る
    var offsets = [];
    var attempts = 0;
    var maxAttempts = 3;

    function measure() {
      var t0 = Date.now();
      fetch('https://worldtimeapi.org/api/ip')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var t1 = Date.now();
          var rtt = t1 - t0;
          // サーバー時刻 (ms) + RTT/2 = 推定正確時刻
          var serverMs = new Date(data.datetime).getTime();
          var estimatedNow = serverMs + Math.floor(rtt / 2);
          var localNow = t1;
          offsets.push(estimatedNow - localNow);

          attempts++;
          if (attempts < maxAttempts) {
            setTimeout(measure, 100);
          } else {
            // 中央値
            offsets.sort(function(a, b) { return a - b; });
            var median = offsets[Math.floor(offsets.length / 2)];
            callback(median);
          }
        })
        .catch(function() {
          // API失敗時はオフセット0で続行
          attempts++;
          if (attempts < maxAttempts) {
            setTimeout(measure, 100);
          } else {
            offsets.sort(function(a, b) { return a - b; });
            callback(offsets.length > 0 ? offsets[Math.floor(offsets.length / 2)] : 0);
          }
        });
    }
    measure();
  }

  function playFrames(fr, clockOffset) {
    var totalFrames = fr.length;
    var interval = 1000 / fps;
    var lastColor = '';
    var lastIdx = -1;

    function tick() {
      // 補正済み現在時刻
      var correctedNow = Date.now() + clockOffset;
      var elapsed = correctedNow - startTs;

      if (elapsed < 0) {
        // まだ開始前
        var secLeft = Math.ceil(-elapsed / 1000);
        status.textContent = secLeft + '...';
        requestAnimationFrame(tick);
        return;
      }

      status.textContent = '';
      var idx = Math.floor(elapsed / interval);

      if (idx >= totalFrames) {
        screen.style.backgroundColor = '#000';
        return;
      }

      if (idx !== lastIdx) {
        var color = fr[idx];
        if (color !== lastColor) {
          screen.style.backgroundColor = color;
          lastColor = color;
        }
        lastIdx = idx;
      }

      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  }

})();
</script>
</body>
</html>
