<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ashra Performance</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #000; touch-action: none;
}
#screen { width: 100vw; height: 100vh; }
#debug {
  position: fixed; bottom: 4px; right: 4px;
  color: rgba(255,255,255,0.15); font: 9px monospace;
  pointer-events: none;
}
#countdown {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  color: rgba(255,255,255,0.3); font: bold 20vw monospace;
  pointer-events: none;
}
</style>
</head>
<body>
<div id="screen"></div>
<div id="debug"></div>
<div id="countdown"></div>
<script>
(function() {
  'use strict';

  var params = new URLSearchParams(location.search);
  var fps = parseInt(params.get('fps') || '10', 10);
  var serial = params.get('serial') || '';
  var startTs = parseInt(params.get('start') || '0', 10);

  var screen = document.getElementById('screen');
  var debug = document.getElementById('debug');
  var countdown = document.getElementById('countdown');

  debug.textContent = serial;

  // Blink 互換
  var text = params.get('text');
  if (text) {
    screen.style.backgroundColor = '#111';
    screen.innerHTML = '<div style="color:#fff;font:bold min(20vw,20vh) monospace;text-align:center;word-break:break-all;padding:8vw">' + text + '</div>';
    return;
  }

  // フレームデータをハッシュから取得
  var hash = location.hash.substring(1);
  if (!hash) { countdown.textContent = '?'; return; }

  var frames = hash.split(',').map(function(c) {
    c = c.trim();
    if (c.charAt(0) !== '#') c = '#' + c;
    return c;
  });

  if (frames.length === 0) { countdown.textContent = '?'; return; }

  var totalFrames = frames.length;
  var interval = 1000 / fps;
  var lastColor = '';
  var lastIdx = -1;

  // requestAnimationFrame ベースの絶対時刻再生
  // start はサーバー側で端末の時計に合わせて補正済み
  function tick() {
    var now = Date.now();
    var elapsed = now - startTs;

    if (elapsed < 0) {
      // カウントダウン
      var sec = Math.ceil(-elapsed / 1000);
      countdown.textContent = sec > 5 ? '' : String(sec);
      requestAnimationFrame(tick);
      return;
    }

    countdown.textContent = '';
    var idx = Math.floor(elapsed / interval);

    if (idx >= totalFrames) {
      screen.style.backgroundColor = '#000';
      return;
    }

    if (idx !== lastIdx) {
      var color = frames[idx];
      if (color !== lastColor) {
        screen.style.backgroundColor = color;
        lastColor = color;
      }
      lastIdx = idx;
    }

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);

})();
</script>
</body>
</html>
