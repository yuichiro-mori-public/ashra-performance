<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ashra Performance</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #000; touch-action: none;
}
#screen { width: 100vw; height: 100vh; }
#debug {
  position: fixed; bottom: 4px; right: 4px;
  color: rgba(255,255,255,0.15); font: 9px monospace;
  pointer-events: none;
}
#status {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  color: rgba(255,255,255,0.4); font: 14px monospace; text-align: center;
}
</style>
</head>
<body>
<div id="screen"></div>
<div id="debug"></div>
<div id="status"></div>
<script>
(function() {
  'use strict';

  var params = new URLSearchParams(location.search);
  var fps = parseInt(params.get('fps') || '10', 10);
  var serial = params.get('serial') || '';
  var startTs = parseInt(params.get('start') || '0', 10);

  var screen = document.getElementById('screen');
  var debug = document.getElementById('debug');
  var status = document.getElementById('status');

  debug.textContent = serial;

  // Blink 互換モード
  var text = params.get('text');
  if (text) {
    screen.style.backgroundColor = '#111';
    screen.innerHTML = '<div style="color:#fff;font:bold min(20vw,20vh) monospace;text-align:center;word-break:break-all;padding:8vw">' + text + '</div>';
    return;
  }

  // ── フレームデータをハッシュフラグメントから取得 ──
  // URL: ...#ff0000,00ff00,0000ff,...  (各フレームの色をカンマ区切り、#なし可)
  var hash = location.hash.substring(1); // '#' を除去
  if (!hash) {
    // フォールバック: frames_url パラメータから fetch
    var framesUrl = params.get('frames_url');
    var x = parseInt(params.get('x') || '0', 10);
    var y = parseInt(params.get('y') || '0', 10);
    if (framesUrl) {
      status.textContent = 'Loading...';
      fetch(framesUrl)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var frames = data.frames || data;
          var myFrames = [];
          for (var i = 0; i < frames.length; i++) {
            if (frames[i][y] && frames[i][y][x]) {
              myFrames.push(frames[i][y][x]);
            } else {
              myFrames.push('#000000');
            }
          }
          status.textContent = '';
          playFrames(myFrames);
        })
        .catch(function(e) { status.textContent = 'Error: ' + e.message; });
    } else {
      status.textContent = 'No frame data';
    }
    return;
  }

  // ハッシュからフレーム配列をパース
  var myFrames = hash.split(',').map(function(c) {
    c = c.trim();
    if (c.charAt(0) !== '#') c = '#' + c;
    return c;
  });

  status.textContent = '';
  playFrames(myFrames);

  // ── 再生 ──
  function playFrames(frames) {
    var totalFrames = frames.length;
    if (totalFrames === 0) { status.textContent = 'No frames'; return; }

    var interval = 1000 / fps;
    var frameIdx = 0;
    var lastColor = '';

    // start タイムスタンプで同期
    if (startTs > 0) {
      var elapsed = Date.now() - startTs;
      if (elapsed > 0) {
        frameIdx = Math.floor(elapsed / interval);
        if (frameIdx >= totalFrames) {
          screen.style.backgroundColor = '#000';
          return;
        }
      }
    }

    function tick() {
      if (frameIdx >= totalFrames) {
        screen.style.backgroundColor = '#000';
        return;
      }
      var color = frames[frameIdx];
      if (color !== lastColor) {
        screen.style.backgroundColor = color;
        lastColor = color;
      }
      frameIdx++;
      setTimeout(tick, interval);
    }

    // 開始時刻まで待機
    if (startTs > 0) {
      var delay = startTs - Date.now();
      if (delay > 0) {
        status.textContent = 'Starting in ' + Math.ceil(delay / 1000) + 's...';
        setTimeout(function() { status.textContent = ''; tick(); }, delay);
      } else {
        tick();
      }
    } else {
      tick();
    }
  }

})();
</script>
</body>
</html>
