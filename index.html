<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ashra Performance</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #000; touch-action: none;
}
#screen {
  width: 100vw; height: 100vh;
  display: flex; align-items: center; justify-content: center;
}
#debug {
  position: fixed; bottom: 4px; right: 4px;
  color: rgba(255,255,255,0.15); font: 9px monospace;
  pointer-events: none;
}
#status {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  color: rgba(255,255,255,0.4); font: 14px monospace; text-align: center;
}
</style>
</head>
<body>
<div id="screen"></div>
<div id="debug"></div>
<div id="status"></div>
<script>
(function() {
  'use strict';

  var params = new URLSearchParams(location.search);
  var x = parseInt(params.get('x') || '0', 10);
  var y = parseInt(params.get('y') || '0', 10);
  var fps = parseInt(params.get('fps') || '10', 10);
  var serial = params.get('serial') || '';
  var framesUrl = params.get('frames_url') || '';
  var startTs = parseInt(params.get('start') || '0', 10);

  var screen = document.getElementById('screen');
  var debug = document.getElementById('debug');
  var status = document.getElementById('status');

  debug.textContent = serial + ' (' + x + ',' + y + ')';

  // ── フレームなし: Blink モード (後方互換) ──
  var text = params.get('text');
  if (text && !framesUrl) {
    screen.style.backgroundColor = '#111';
    screen.innerHTML = '<div style="color:#fff;font:bold min(20vw,20vh) monospace;text-align:center;word-break:break-all;padding:8vw">' + text + '</div>';
    return;
  }

  if (!framesUrl) {
    status.textContent = 'Waiting for frames_url...';
    return;
  }

  // ── フレーム読み込み ──
  status.textContent = 'Loading...';

  fetch(framesUrl)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      status.textContent = '';
      var frames = data.frames || data;
      var totalFrames = frames.length;
      if (totalFrames === 0) {
        status.textContent = 'No frames';
        return;
      }

      var interval = 1000 / fps;
      var frameIdx = 0;

      // start タイムスタンプで同期: 開始からの経過分をスキップ
      if (startTs > 0) {
        var elapsed = Date.now() - startTs;
        if (elapsed > 0) {
          frameIdx = Math.floor(elapsed / interval);
          if (frameIdx >= totalFrames) {
            // 既に終了
            screen.style.backgroundColor = '#000';
            status.textContent = 'Finished';
            return;
          }
        }
      }

      // ── 再生ループ ──
      var lastColor = '';

      function tick() {
        if (frameIdx >= totalFrames) {
          screen.style.backgroundColor = '#000';
          return;
        }

        var frame = frames[frameIdx];
        var color = '#000000';
        if (frame && frame[y] && frame[y][x]) {
          color = frame[y][x];
        }

        // 色が変わったときだけ DOM 更新 (パフォーマンス最適化)
        if (color !== lastColor) {
          screen.style.backgroundColor = color;
          lastColor = color;
        }

        frameIdx++;
        setTimeout(tick, interval);
      }

      // 開始時刻に合わせて遅延開始
      if (startTs > 0) {
        var delay = startTs - Date.now();
        if (delay > 0) {
          status.textContent = 'Starting in ' + Math.ceil(delay / 1000) + 's...';
          setTimeout(function() {
            status.textContent = '';
            tick();
          }, delay);
        } else {
          tick();
        }
      } else {
        tick();
      }
    })
    .catch(function(e) {
      status.textContent = 'Error: ' + e.message;
    });

})();
</script>
</body>
</html>
